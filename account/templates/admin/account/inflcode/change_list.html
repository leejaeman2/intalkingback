{% extends "admin/change_list.html" %}

{% block object-tools-items %}
    <li>
        <form method="post" action="generate/" style="display: inline-flex; align-items: center; gap: 6px;">
            {% csrf_token %}
            <label for="id_count" style="color: var(--body-fg, inherit);">생성할 개수:</label>
            <input type="number" id="id_count" name="count" value="1" min="1" max="100"
                   style="width: 70px; padding: 4px 6px;"/>
            <button type="submit" class="addlink" style="margin: 0;">코드 생성</button>
        </form>
    </li>
    {{ block.super }}
{% endblock %}
